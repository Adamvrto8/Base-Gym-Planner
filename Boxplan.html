<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Base Gym Planner — Weekly WOD Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
    --border: #2a2a2a; --accent: #4caf3f; --accent2: #6fd45f;
    --teal: #3af0e8; --purple: #a855f7; --amber: #f59e0b;
    --text: #f0f0f0; --muted: #555; --muted2: #333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; padding: 32px 20px; }

  .wrap { max-width: 1140px; margin: 0 auto; }

  /* HEADER */
  header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 32px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 60px; line-height: 0.9; letter-spacing: 2px; }
  h1 span { color: var(--accent); }
  .sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; margin-top: 8px; }
  .week-badge { text-align: right; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; }
  .week-badge strong { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--accent2); }



  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }

  /* PANEL */
  .panel { background: var(--surface); border: 1px solid var(--border); padding: 24px; }
  .panel-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  label.field { display: block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; margin-top: 18px; }
  label.field:first-of-type { margin-top: 0; }

  textarea, input.field-input, select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 10px 12px; outline: none; transition: border-color 0.2s;
  }
  textarea:focus, input.field-input:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 200px; line-height: 1.7; }
  select option { background: var(--surface2); }
  .hint { font-family: 'DM Mono', monospace; font-size: 10px; color: #383838; margin-top: 5px; line-height: 1.6; }

  .btn { width: 100%; background: var(--accent); color: #fff; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; padding: 15px; cursor: pointer; margin-top: 22px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: opacity 0.2s, transform 0.1s; }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { background: var(--muted2); color: var(--muted); cursor: not-allowed; transform: none; }
  .spinner { width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; display: none; }
  .loading .spinner { display: block; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* OUTPUT */
  .out-panel { background: var(--surface); border: 1px solid var(--border); padding: 24px; min-height: 480px; }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 380px; color: var(--muted2); text-align: center; }
  .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: 0.35; }
  .empty p { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; line-height: 1.8; }
  .error-box { background: #1a0a0a; border: 1px solid var(--accent2); color: var(--accent2); padding: 14px; font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.7; }

  /* THEME CARD */
  .theme-card { background: var(--accent); color: #fff; padding: 18px 20px; margin-bottom: 20px; }
  .theme-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; margin-bottom: 5px; }
  .theme-name { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; }
  .theme-desc { font-size: 12px; margin-top: 7px; opacity: 0.85; line-height: 1.55; }

  /* DAY GRID */
  .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .day-card { background: var(--surface2); border: 1px solid var(--border); overflow: hidden; animation: fadeUp 0.35s ease both; }
  .day-card:nth-child(1) { animation-delay:.05s; border-top: 3px solid var(--accent); }
  .day-card:nth-child(2) { animation-delay:.10s; border-top: 3px solid var(--teal); }
  .day-card:nth-child(3) { animation-delay:.15s; border-top: 3px solid var(--accent2); }
  .day-card:nth-child(4) { animation-delay:.20s; border-top: 3px solid var(--purple); }
  .day-card:nth-child(5) { animation-delay:.25s; border-top: 3px solid var(--amber); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .day-colors { --c0: #e8ff3a; --c1: #3af0e8; --c2: #ff4d1c; --c3: #a855f7; --c4: #f59e0b; }
  .day-header { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .day-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; }
  .day-date { font-family: 'DM Mono', monospace; font-size: 9px; color: #444; }
  .day-body { padding: 12px; }

  .stag { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #444; margin: 12px 0 5px; }
  .stag:first-child { margin-top: 0; }
  .scontent { font-size: 11px; line-height: 1.7; color: #ccc; }
  .scontent strong { color: var(--accent2); font-weight: 600; }
  .time-badge { display: inline-flex; align-items: center; gap: 4px; font-family: 'DM Mono', monospace; font-size: 9px; color: #444; background: var(--bg); border: 1px solid var(--border); padding: 3px 8px; margin-top: 5px; letter-spacing: 1px; }

  .scale-row { display: flex; gap: 5px; font-size: 10px; font-family: 'DM Mono', monospace; margin-bottom: 4px; align-items: flex-start; line-height: 1.5; color: #bbb; }
  .badge { font-size: 8px; padding: 2px 5px; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; margin-top: 1px; font-weight: 700; }
  .badge.rx { background: var(--accent); color: #fff; }
  .badge.sc { background: var(--teal); color: #000; }
  .badge.bg { background: var(--accent2); color: #fff; }

  .actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-sm { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 9px 14px; cursor: pointer; transition: all 0.2s; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .btn-sheets { width: 100%; background: transparent; color: var(--teal); border: 1px solid var(--teal); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 14px; cursor: pointer; margin-top: 10px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-sheets:hover { background: var(--teal); color: #000; }
  .btn-sheets:disabled { opacity: 0.4; cursor: not-allowed; }
  .log-status { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-left: auto; }
  .log-status.ok  { color: var(--accent); }
  .log-status.err { color: #e05555; }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .days-grid { grid-template-columns: repeat(2, 1fr); }
    .day-card:last-child { grid-column: 1 / -1; }
  }
</style>
</head>

<script>
// ── Week label ──────────────────────────────────────────────────────────────
const now = new Date();
const nextMon = new Date(now);
const diff = now.getDay() === 0 ? 1 : 8 - now.getDay();
nextMon.setDate(now.getDate() + diff);
const fmt = d => d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
document.getElementById('weekLabel').textContent = fmt(nextMon);

function weekDates() {
  return Array.from({length: 5}, (_, i) => {
    const d = new Date(nextMon); d.setDate(d.getDate() + i); return d;
  });
}

// ── Generate ─────────────────────────────────────────────────────────────────
async function generatePlan() {
  let apiKey = localStorage.getItem('anthropicKey') || '';
  if (!apiKey) {
    apiKey = (prompt('Enter your Anthropic API key (saved locally, never shared):') || '').trim();
    if (!apiKey) return;
    localStorage.setItem('anthropicKey', apiKey);
  }
  const log    = document.getElementById('logInput').value.trim();
  const focus  = document.getElementById('focusInput').value.trim();
  const level  = document.getElementById('levelSelect').value;
  const btn    = document.getElementById('genBtn');
  const spin   = document.getElementById('spinner');
  const btnTxt = document.getElementById('btnText');

  if (!log) { alert('Training log not loaded yet. Check your internet connection and try again.'); return; }

  btn.disabled = true; spin.style.display = 'block'; btnTxt.textContent = 'GENERATING...';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('planOut').style.display = 'none';

  const prompt = `You are an expert CrossFit programmer. Analyze the training log and generate a complete 5-day plan for next week.

TRAINING LOG:
${log}

TRAINER NOTES: ${focus || 'None'}
ATHLETE LEVEL: ${level}

Rules:
- No same movement pattern on consecutive days
- Balance: Olympic lifting, powerlifting, gymnastics, cardio machines
- Include a punchy weekly theme
- Each day: strength block + metcon
- Each metcon: time domain + 3 scaling options (Rx, Scaled, Beginner)

Respond ONLY with valid JSON, no markdown, no backticks:
{
  "weekTheme": "short punchy name",
  "themeDescription": "1-2 sentences on the weekly focus",
  "days": [
    {
      "day": "Monday",
      "strength": { "title": "...", "description": "sets/reps/loading", "coachNote": "short cue" },
      "metcon": {
        "title": "WOD name / format",
        "description": "full WOD",
        "timeDomain": "e.g. 12-15 min",
        "scaling": { "rx": "...", "scaled": "...", "beginner": "..." }
      }
    }
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data  = await res.json();
    const raw   = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    renderPlan(JSON.parse(clean));

  } catch (e) {
    document.getElementById('planOut').innerHTML =
      `<div class="error-box">// ERROR: ${e.message}<br><br>Check that your API key is correct and has credits.</div>`;
    document.getElementById('planOut').style.display = 'block';
  }

  btn.disabled = false; spin.style.display = 'none'; btnTxt.textContent = 'GENERATE WEEK PLAN';
}

// ── Render ───────────────────────────────────────────────────────────────────
const DAY_SHORT  = ['MON','TUE','WED','THU','FRI'];
const DAY_COLORS = ['#e8ff3a','#3af0e8','#ff4d1c','#a855f7','#f59e0b'];
const DAY_FG     = ['#000','#000','#fff','#fff','#000'];

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPlan(plan) {
  const dates = weekDates();
  window._plan = plan;

  let html = `
    <div class="panel-title">Week Plan — ${esc(fmt(nextMon))}</div>
    <div class="theme-card">
      <div class="theme-label">// Weekly Theme</div>
      <div class="theme-name">${esc(plan.weekTheme)}</div>
      <div class="theme-desc">${esc(plan.themeDescription)}</div>
    </div>
    <div class="days-grid">`;

  plan.days.forEach((day, i) => {
    html += `
      <div class="day-card">
        <div class="day-header">
          <span class="day-name" style="color:${DAY_COLORS[i]}">${DAY_SHORT[i]}</span>
          <span class="day-date">${esc(fmt(dates[i]))}</span>
        </div>
        <div class="day-body">
          <div class="stag">// Strength</div>
          <div class="scontent"><strong>${esc(day.strength.title)}</strong><br>${esc(day.strength.description)}</div>
          ${day.strength.coachNote ? `<div class="stag">// Cue</div><div class="scontent" style="color:#555;font-style:italic;font-size:10px">${esc(day.strength.coachNote)}</div>` : ''}
          <div class="stag">// Metcon</div>
          <div class="scontent"><strong>${esc(day.metcon.title)}</strong><br>${esc(day.metcon.description)}</div>
          <div class="time-badge">⏱ ${esc(day.metcon.timeDomain)}</div>
          <div class="stag">// Scaling</div>
          <div class="scale-row"><span class="badge rx">RX</span><span>${esc(day.metcon.scaling.rx)}</span></div>
          <div class="scale-row"><span class="badge sc">SC</span><span>${esc(day.metcon.scaling.scaled)}</span></div>
          <div class="scale-row"><span class="badge bg">BG</span><span>${esc(day.metcon.scaling.beginner)}</span></div>
        </div>
      </div>`;
  });

  html += `</div>
    <div class="actions">
      <button class="btn-sm" onclick="copyPlan()">COPY AS TEXT</button>
      <button class="btn-sm" onclick="window.print()">PRINT / SAVE PDF</button>
      <button class="btn-sm" id="saveBtn" onclick="saveToSheets()" style="border-color:var(--teal);color:var(--teal)">SAVE TO SHEETS</button>
    </div>`;

  const out = document.getElementById('planOut');
  out.innerHTML = html;
  out.style.display = 'block';
}

function copyPlan() {
  if (!window._plan) return;
  const p = window._plan;
  let t = `WEEK THEME: ${p.weekTheme}\n${p.themeDescription}\n\n`;
  p.days.forEach(d => {
    t += `=== ${d.day} ===\nSTRENGTH: ${d.strength.title}\n${d.strength.description}\n`;
    if (d.strength.coachNote) t += `Cue: ${d.strength.coachNote}\n`;
    t += `\nMETCON: ${d.metcon.title}\n${d.metcon.description}\nTime: ${d.metcon.timeDomain}\n`;
    t += `RX: ${d.metcon.scaling.rx}\nScaled: ${d.metcon.scaling.scaled}\nBeginner: ${d.metcon.scaling.beginner}\n\n`;
  });
  navigator.clipboard.writeText(t).then(() => alert('Copied!'));
}

// ── Google Sheets integration ─────────────────────────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzNv50zR2tzthhEI_LHgTb7VM1kow144wIlzb6QbnmOTki5XgRxyUzaYxN1iXIlUX_4Ig/exec';

async function loadFromSheets() {
  const status = document.getElementById('logStatus');
  status.textContent = '// syncing logs...';
  status.className = 'log-status';
  try {
    const res  = await fetch(`${SHEETS_URL}?action=getLogs&limit=60`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('logInput').value = data.log;
    status.textContent = `// \u2713 ${data.totalRows} rows loaded`;
    status.className = 'log-status ok';
  } catch (e) {
    status.textContent = '// \u26a0 could not load logs';
    status.className = 'log-status err';
  }
}

document.addEventListener('DOMContentLoaded', loadFromSheets);

async function saveToSheets() {
  if (!window._plan) { alert('Generate a plan first.'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'SAVING...';

  const plan      = window._plan;
  const weekStart = fmt(nextMon);

  try {
    for (const day of plan.days) {
      const params = new URLSearchParams({
        action       : 'saveDay',
        weekStart,
        weekTheme    : plan.weekTheme,
        day          : day.day,
        strengthTitle: day.strength.title,
        strengthDesc : day.strength.description,
        coachNote    : day.strength.coachNote || '',
        metconTitle  : day.metcon.title,
        metconDesc   : day.metcon.description,
        timeDomain   : day.metcon.timeDomain,
        rx           : day.metcon.scaling.rx,
        scaled       : day.metcon.scaling.scaled,
        beginner     : day.metcon.scaling.beginner
      });
      const res = await fetch(`${SHEETS_URL}?${params}`);
      const result = await res.json();
      if (result.error) throw new Error(result.error);
    }

    btn.textContent = '\u2713 SAVED';
    btn.style.cssText = 'border-color:var(--accent);color:var(--accent)';
    setTimeout(() => {
      btn.textContent = 'SAVE TO SHEETS';
      btn.style.cssText = 'border-color:var(--teal);color:var(--teal)';
      btn.disabled = false;
    }, 3000);

  } catch (e) {
    btn.textContent = '\u26a0 ERROR';
    btn.style.cssText = 'border-color:#e05555;color:#e05555';
    setTimeout(() => {
      btn.textContent = 'SAVE TO SHEETS';
      btn.style.cssText = 'border-color:var(--teal);color:var(--teal)';
      btn.disabled = false;
    }, 3000);
    alert('Save error: ' + e.message);
  }
}
</script>
